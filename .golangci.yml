version: "2"

run:
  timeout: 3m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - bodyclose
    - noctx
    - prealloc
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
        - name: unused-parameter
          severity: warning
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*net.Conn).Close
        - (*tls.Conn).Close
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Printf
        - fmt.Println
        - (*github.com/fatih/color.Color).Printf
        - (*github.com/fatih/color.Color).Println
  exclusions:
    rules:
      - linters:
          - errcheck
        text: "Error return value of `resp\\.Body\\.Close`"
      - linters:
          - errcheck
        text: "Error return value of `fResp\\.Body\\.Close`"
      - linters:
          - errcheck
        text: "Error return value of `conn\\.Close`"
      - linters:
          - revive
        text: "exported .* should have comment"
    presets:
      - comments
